<h2>Search Items</h2>
<div>
  <input type="text" placeholder="Search by name..." [(ngModel)]="searchTerm" (keyup.enter)="search()">
  <button (click)="search()">🔍 Search</button>
  <button (click)="showAll()">📋 Show All</button>
  <button (click)="showPopular()">⭐ Show Popular</button>
</div>

<div *ngIf="filteredItems.length === 0">No items found.</div>

<table *ngIf="filteredItems.length > 0">
  <thead>
    <tr>
      <th>ID</th><th>Name</th><th>Category</th><th>Qty</th><th>Price</th>
      <th>Supplier</th><th>Stock</th><th>Popular</th><th>Actions</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let item of filteredItems">
      <td>{{item.id}}</td>
      <td>{{item.name}}</td>
      <td>{{item.category}}</td>
      <td>{{item.quantity}}</td>
      <td>${{item.price.toFixed(2)}}</td>
      <td>{{item.supplier}}</td>
      <td>{{item.stockStatus}}</td>
      <td>{{item.popular}}</td>
      <td>
        <button (click)="editItem(item.id)">Edit</button>
        <button (click)="deleteItem(item.id)">Delete</button>
      </td>
    </tr>
  </tbody>
</table>
